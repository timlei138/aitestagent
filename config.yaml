# AI 自动化测试 Agent 配置文件
# 环境变量: OPENAI_API_KEY / OPENAI_BASE_URL / VISION_API_KEY / VISION_BASE_URL / ANDROID_SERIAL

# ── Chat 模型（纯文本：Agent 推理 / Intent 解析）──
llm_provider: "openai"   # 可选: openai / zhipu
model: "deepseek-v4-pro"
api_key: sk-296391b7a893487881d45f2726db67b6          # 留空从 OPENAI_API_KEY 读取
base_url: https://api.deepseek.com         # 留空从 OPENAI_BASE_URL 读取

# ── Vision 模型（多模态：SmartPerceiver 截图分析）──
vision_provider: "zhipu"  # 可选: openai / zhipu
vision_model: "glm-4.6v-flash"
vision_api_key: 054dc70864266b6e40df256f7cf3d01a.PFY3duz6Hu1KDJu7   # 留空先取 VISION_API_KEY 环境变量，再回退到 api_key
vision_base_url: null # 留空先取 VISION_BASE_URL 环境变量，再回退到 base_url

# ── Embedding 模型（RAG 向量化）──
embedding_model: "text-embedding-3-small"

# 设备配置
device_serial: null    # 留空自动连接，或从 ANDROID_SERIAL 读取
launch_activity: ".SplashActivity"   # 可选：指定主启动 Activity，避免误入 LeakLauncherActivity

# 感知配置
enable_vision: true
auto_switch_perception: true
stuck_threshold: 2

# RAG 知识库
enable_rag: false
rag_persist_dir: "storage/knowledge"

# 存储路径
baseline_dir: "storage/baselines"
screenshot_dir: "storage/screenshots"
result_dir: "storage/results"
report_dir: "reports"

# 遍历限制
traversal_max_depth: 5
traversal_max_pages: 50
traversal_max_clicks: 300

# 异常检测阈值
white_screen_threshold: 0.95
black_screen_threshold: 0.95
incomplete_display_ratio: 0.5
critical_incomplete_ratio: 0.3
phash_distance_low: 15
phash_distance_medium: 20

# 安全等级: strict(禁止所有危险操作) / normal(需确认) / manual(仅执行明确步骤)
safety_level: "strict"
