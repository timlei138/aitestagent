# AI 自动化测试 Agent 配置文件
# 敏感信息（API Key）请配置在 config.local.yaml（已 gitignore）

# ── LLM ──
llm_provider: openai
model: deepseek-v4-pro
base_url: https://api.deepseek.com

# ── Vision 模型（SmartPerceiver 截图分析）──
vision_provider: zhipu
vision_model: glm-4.6v-flash
vision_base_url: ""

# ── Embedding（RAG 向量化）──
embedding_provider: huggingface
embedding_model: BAAI/bge-large-zh-v1.5
embedding_base_url: ""

# ── 感知模式: hybrid(自动切换) | ui_tree(最快) | vision(截图分析) ──
perception_mode: ui_tree

# ── RAG ──
rag_persist_dir: storage/knowledge

# ── 安全 ──
safety_level: strict
