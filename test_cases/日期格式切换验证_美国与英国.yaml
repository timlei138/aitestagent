name: 日期格式切换验证(美国与英国)
description: 验证在通用设置日期和时间中切换美国与英国时区后日期格式正确显示
app_package: com.android.settings
app_name: Settings
steps:
- index: 1
  intent: 启动设置应用
  action_type: launch_app
  target: com.android.settings
  alternatives: []
  expected: 设置主页面
- index: 2
  intent: 导航到通用设置
  action_type: navigate_tab
  target: 通用设置
  alternatives:
  - 通用
  - General
  expected: 通用设置页面
- index: 3
  intent: 点击日期和时间
  action_type: click
  target: 日期和时间
  alternatives:
  - 日期与时间
  - Date & Time
  expected: 日期和时间设置页面
- index: 4
  intent: 点击时区
  action_type: click
  target: 时区
  alternatives:
  - Time Zone
  - 选择时区
  expected: 时区设置页面
- index: 5
  intent: 点击地区筛选
  action_type: click
  target: 地区
  alternatives:
  - 区域
  - Region
  - 选择地区
  expected: 地区选择界面
- index: 6
  intent: 选择美国时区
  action_type: click
  target: 美国
  alternatives:
  - United States
  - 美国东部
  - 东部标准时间
  expected: 时区切换为美国
- index: 7
  intent: 等待日期格式更新
  action_type: wait
  target: '3'
  alternatives: []
  expected: 日期格式更新为月/日/年
- index: 8
  intent: 验证日期格式为MM/dd/yyyy
  action_type: assert
  target: 日期格式为 MM/dd/yyyy
  alternatives:
  - 月/日/年
  - mm-dd-yyyy
  - 06/15/2026
  expected: 日期和时间页面显示MM/dd/yyyy格式
- index: 9
  intent: 重新进入时区设置
  action_type: click
  target: 时区
  alternatives:
  - Time Zone
  - 选择时区
  expected: 时区设置页面
- index: 10
  intent: 点击地区筛选
  action_type: click
  target: 地区
  alternatives:
  - 区域
  - Region
  - 选择地区
  expected: 地区选择界面
- index: 11
  intent: 选择英国时区
  action_type: click
  target: 英国
  alternatives:
  - United Kingdom
  - 伦敦
  - 格林威治标准时间
  expected: 时区切换为英国
- index: 12
  intent: 等待日期格式更新
  action_type: wait
  target: '3'
  alternatives: []
  expected: 日期格式更新为日/月/年
- index: 13
  intent: 验证日期格式为dd/MM/yyyy
  action_type: assert
  target: 日期格式为 dd/MM/yyyy
  alternatives:
  - 日/月/年
  - dd-mm-yyyy
  - 15/06/2026
  expected: 日期和时间页面显示dd/MM/yyyy格式
verification:
- 美国时区下日期格式显示为月/日/年
- 英国时区下日期格式显示为日/月/年
created_at: '2026-06-16T11:30:22.428664'
