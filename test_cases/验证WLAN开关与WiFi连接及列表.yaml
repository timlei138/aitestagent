name: 验证WLAN开关与WiFi连接及列表
description: 打开设置进入WLAN，开启开关，等待10秒，确认WiFi连接并显示可用网络列表
app_package: com.android.settings
app_name: Settings
steps:
- index: 1
  intent: Launch Settings app
  action_type: launch_app
  target: com.android.settings
  alternatives: []
  expected: Settings main page
- index: 2
  intent: Navigate to WLAN section
  action_type: navigate_tab
  target: WLAN
  alternatives: []
  expected: WLAN settings page
- index: 3
  intent: Turn on WLAN switch
  action_type: click
  target: WLAN开关
  alternatives:
  - WLAN
  - switch_row
  expected: WLAN switch turns ON
- index: 4
  intent: Wait for WiFi scan and connection
  action_type: wait
  target: '10'
  alternatives: []
  expected: WiFi connected and network list appears
- index: 5
  intent: Verify WiFi connection and available network list
  action_type: assert
  target: WiFi已连接并有可用网络列表
  alternatives: []
  expected: Connected WiFi shown with list of available networks
verification:
- WLAN switch is ON
- WiFi is connected
- Available WiFi networks are listed
created_at: '2026-06-12T16:56:21.034468'
