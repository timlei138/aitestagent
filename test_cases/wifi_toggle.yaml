name: "Settings Wi-Fi 开关测试"
description: "检查 Settings 中 Wi-Fi 开关关闭和打开后的状态"
app_package: "com.android.settings"
app_name: "Settings"
steps:
  - intent: "启动 Settings"
    type: "launch_app"
    app_package: "com.android.settings"
  - intent: "点击 Wi-Fi"
    type: "click"
    target: "Wi-Fi"
  - intent: "等待 Wi-Fi 页面加载"
    type: "wait"
    seconds: 1
verification:
  - "Wi-Fi 页面可以打开"
