name: WLAN 功能测试计划
description: 验证 Android Settings 应用中 WLAN 功能的开/关切换、连接状态以及可用网络列表的显示情况
app_package: com.android.settings
app_name: Settings
steps:
- index: 1
  intent: 打开 Settings APP
  action_type: launch_app
  target: com.android.settings
  alternatives: []
  expected: Settings 主界面正常加载，显示左侧导航栏和右侧内容区
- index: 2
  intent: 在左侧导航栏中定位并点击 WLAN 项
  action_type: click
  target: WLAN
  alternatives: []
  expected: 右侧内容区切换为 WLAN 设置界面
- index: 3
  intent: 点击 WLAN 开关
  action_type: click
  target: WLAN 开关
  alternatives: []
  expected: WLAN 开关状态发生切换（on→off 或 off→on）
- index: 4
  intent: 等待 10 秒
  action_type: wait
  target: ''
  alternatives: []
  expected: 系统有足够时间完成 Wi-Fi 扫描和连接
- index: 5
  intent: 观察 Wi-Fi 连接状态
  action_type: assert
  target: ''
  alternatives: []
  expected: '若开关为 ON：

    • 应显示已连接的网络名称（SSID）

    • 状态标识为"已连接"


    若开关为 OFF：

    • 应显示"WLAN 已关闭"或类似提示'
- index: 6
  intent: 观察可用 WLAN 列表
  action_type: assert
  target: ''
  alternatives: []
  expected: '• 列表显示扫描到的周围 Wi-Fi 热点

    • 每个热点显示 SSID 名称和信号强度图标

    • 已连接的网络排在列表顶部并有"已连接"标记

    • 如有安全网络，应显示锁形图标'
verification:
- 左侧 WLAN 项可正常点击并导航至右侧 WLAN 界面，WLAN 开关可正常响应点击，状态实时切换，10 秒内 Wi-Fi 扫描完成列表刷新，若开关打开且范围内有已知网络应自动连接，可用
  WLAN 列表非空
created_at: '2026-06-12T14:35:03.832260'
